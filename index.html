<!DOCTYPE html>
<html>
<head>
  <title>RV Repair Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    margin: 0;
    background: #f5f7fb;
    color: #111;
  }

  h1 {
    font-size: 22px;
    margin: 0;
  }

  .header {
    position: sticky;
    top: 0;
    background: white;
    padding: 16px;
    text-align: center;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    z-index: 10;
  }

  .container {
    padding: 12px;
  }

  .card {
    background: white;
    padding: 16px;
    margin-bottom: 14px;
    border-radius: 16px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
  }

  .featured {
    border: 2px solid #007bff;
  }

  .button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
  }

  .primary {
    background: #007bff;
    color: white;
  }

  .secondary {
    background: #333;
    color: white;
  }

  .success {
    background: #28a745;
    color: white;
  }

  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    margin-right: 6px;
  }

  .mobile { background: #e3f2fd; }
  .shop { background: #e8f5e9; }
  .emergency { background: #ffebee; }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="/app.js"></script>
</body>
</html>
